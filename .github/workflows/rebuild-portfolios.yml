name: Rebuild Sample Portfolios

on:
  # Manual trigger from the Aurum UI or GitHub — runs full MVO rebuild
  workflow_dispatch:
  # Weekly automatic refresh every Monday 06:00 UTC (after Friday close settles)
  schedule:
    - cron: '0 6 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      # Weekly cron: recompute stats from live prices, keep curated weights intact
      - name: Refresh portfolio stats (weekly)
        if: github.event_name == 'schedule'
        run: node scripts/verify-portfolio-stats.mjs

      # Manual trigger: full MVO rebuild — new weights, new tickers, new stats
      - name: Full MVO rebuild (manual)
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/build-portfolios.mjs

      - name: Commit updated portfolios
        run: |
          git config user.name "Aurum Bot"
          git config user.email "bot@novasect.space"
          git add data/sample-portfolios.json
          git diff --cached --quiet || git commit -m "chore: rebuild sample-portfolios.json [automated]"
          git push
