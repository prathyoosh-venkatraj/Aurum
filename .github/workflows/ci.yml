name: CI

# Phase 4 (resilience): Aurum already ships deterministic, offline test suites
# (engine math + share-allocation) but nothing ran them. This gates main on
# them and re-runs weekly so regressions surface without a manual run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Engine unit tests (deterministic, offline)
        run: node scripts/test-engine.mjs
      - name: Share-allocation tests (fixture-based, offline)
        run: node scripts/test-allocation.mjs
      - name: HTML-escape regression test (XSS helper)
        run: node scripts/test-escape.mjs
