name: CI

# Phase 4 (resilience): Aurum already ships deterministic, offline test suites
# (engine math + share-allocation) but nothing ran them. This gates main on
# them and re-runs weekly so regressions surface without a manual run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies (exact-pinned esbuild, for the parity check)
        run: npm install --no-audit --no-fund
      - name: Unit + integration tests (deterministic, offline)
        run: npm test
      - name: Verify committed .min artifacts match source (no stale bundles)
        run: npm run verify-build
